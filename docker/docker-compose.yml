version: "3.9"

services:
  # ── API ─────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: api
    image: ich-detection-api:latest
    container_name: ich-api
    ports:
      - "8000:8000"
    volumes:
      - ../models/production:/workspace/models/production:ro
      - ../params.yaml:/workspace/params.yaml:ro
    environment:
      - INFERENCE_DEVICE=cpu
      - MODEL_CHECKPOINT=/workspace/models/production/best_model.pt
      - ALLOWED_ORIGINS=http://localhost:3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── MLflow Tracking Server ───────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.3
    container_name: ich-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ../mlruns:/mlruns
    command: >
      mlflow server
      --backend-store-uri /mlruns
      --default-artifact-root /mlruns
      --host 0.0.0.0
      --port 5000
    restart: unless-stopped

networks:
  default:
    name: ich-network
