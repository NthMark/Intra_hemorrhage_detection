name: ich-detection
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip>=24.0

  # PyTorch (conda-managed for CUDA compatibility)
  - pytorch>=2.2.0
  - torchvision>=0.17.0
  - pytorch-cuda=12.1

  # Scientific stack
  - numpy>=1.26.0
  - scipy>=1.13.0
  - pandas>=2.2.2
  - scikit-learn>=1.4.2
  - matplotlib>=3.8.4
  - seaborn>=0.13.2

  # Jupyter
  - jupyterlab>=4.2.0
  - ipywidgets>=8.1.3

  - pip:
    # timm (not on conda)
    - timm>=0.9.16

    # Medical imaging
    - pydicom>=2.4.4
    - nibabel>=5.2.1
    - Pillow>=10.3.0

    # Augmentation
    - albumentations>=1.4.3

    # Config
    - PyYAML>=6.0.1

    # Experiment tracking & pipeline
    - mlflow>=2.11.3
    - dvc>=3.50.1

    # API
    - fastapi>=0.111.0
    - uvicorn[standard]>=0.29.0
    - pydantic>=2.7.0

    # Dev / test
    - pytest>=8.2.0
    - pytest-cov>=5.0.0
    - ruff>=0.4.4
    - mypy>=1.10.0

    # Install this package
    - -e .
